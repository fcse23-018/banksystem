# This workflow will build a Java project with Maven and deploy it to an Azure Functions App
# For more information see: https://docs.microsoft.com/en-us/azure/azure-functions/functions-how-to-github-actions

name: Deploy Java project to Azure Functions App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONS_APP_NAME: 'your-app-name'   # set this to your function app name on Azure
  PACKAGE_PATH: '.' # set this to the path to your function app project, defaults to the repository root

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v3

      - name: 'Set up JDK 17'
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 'Build with Maven'
        run: mvn clean install -DskipTests --file pom.xml

